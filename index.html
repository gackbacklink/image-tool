<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Tool Pro</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}

.container{
  background:#1c1c1c;
  padding:20px;
  border-radius:15px;
  max-width:800px;
  margin:auto;
  box-shadow:0 0 20px rgba(0,123,255,0.3);
}

canvas{
  max-width:100%;
  margin-top:15px;
  border-radius:10px;
}

button{
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  font-weight:bold;
}

button:hover{
  opacity:0.85;
}

input[type="number"]{
  width:100px;
  padding:5px;
}
</style>
</head>

<body>

<h1>🚀 Image Tool Pro</h1>

<div class="container">

<input type="file" id="upload" accept="image/*">

<br><br>

🎚 Brightness
<input type="range" id="brightness" min="0" max="200" value="100">

<br><br>

🌫 Blur
<input type="range" id="blur" min="0" max="10" value="0">

<br><br>

📐 Width:
<input type="number" id="newWidth" placeholder="1000">

📐 Height:
<input type="number" id="newHeight" placeholder="1000">

<br><br>

<button onclick="resizeCustom()">🖼 Resize</button>
<button onclick="downloadImage()">📥 Download</button>

<br>

<canvas id="canvas"></canvas>

</div>

<script>
const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const brightness = document.getElementById("brightness");
const blur = document.getElementById("blur");

let img = new Image();

upload.addEventListener("change", function(){
  const file = this.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    img.onload = function(){
      canvas.width = img.width;
      canvas.height = img.height;
      drawImage();
    }
    img.src = e.target.result;
  }
  reader.readAsDataURL(file);
});

function drawImage(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.filter = `brightness(${brightness.value}%) blur(${blur.value}px)`;
  ctx.drawImage(img,0,0,canvas.width,canvas.height);
}

brightness.oninput = drawImage;
blur.oninput = drawImage;

function resizeCustom(){
  const width = parseInt(document.getElementById("newWidth").value);
  const height = parseInt(document.getElementById("newHeight").value);

  if(!width || !height){
    alert("Masukkan width dan height dulu!");
    return;
  }

  const temp = document.createElement("canvas");
  const tempCtx = temp.getContext("2d");

  temp.width = width;
  temp.height = height;

  tempCtx.drawImage(canvas,0,0,width,height);

  canvas.width = width;
  canvas.height = height;

  ctx.drawImage(temp,0,0);
}

function downloadImage(){
  const link = document.createElement("a");
  link.download = "edited-image.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Image Studio</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

canvas{
max-width:100%;
background:white;
border-radius:10px;
margin-top:15px;
cursor:crosshair;
}

button{
padding:8px 12px;
margin:4px;
border:none;
border-radius:8px;
cursor:pointer;
background:#1e293b;
color:white;
font-weight:bold;
}

button:hover{
background:#00c6ff;
}

</style>

</head>

<body>

<div class="container">

<h2>🚀 Smart Image Studio Level 16</h2>

<input type="file" id="upload">

<br>

<canvas id="canvas"></canvas>

<br><br>

<h3>🎨 Tools</h3>

<button onclick="smartEnhance()">🤖 Smart Enhance</button>
<button onclick="addFrame()">🖼 Add Frame</button>
<button onclick="addGradient()">🌈 Gradient</button>

<br><br>

<h3>🖌 Draw</h3>

<button onclick="setBrush()">Brush</button>
<button onclick="setEraser()">Eraser</button>

Size
<input type="range" id="size" min="2" max="40" value="5">

Color
<input type="color" id="color">

<br><br>

<h3>🧩 Text</h3>

<input id="textInput" placeholder="Text">

<button onclick="addText()">Add</button>

<br><br>

<button onclick="saveProject()">💾 Save</button>
<button onclick="loadProject()">📂 Load</button>

<br><br>

<button onclick="download()">📥 Download</button>

</div>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const upload=document.getElementById("upload");

let img=new Image();

upload.addEventListener("change",function(){

const file=this.files[0];
const reader=new FileReader();

reader.onload=function(e){

img.onload=function(){

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

}

img.src=e.target.result;

}

reader.readAsDataURL(file);

});

function smartEnhance(){

const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
const data=imageData.data;

for(let i=0;i<data.length;i+=4){

data[i]*=1.1;
data[i+1]*=1.1;
data[i+2]*=1.1;

}

ctx.putImageData(imageData,0,0);

}

function addFrame(){

ctx.lineWidth=20;
ctx.strokeStyle="white";

ctx.strokeRect(0,0,canvas.width,canvas.height);

}

function addGradient(){

const grad=ctx.createLinearGradient(0,0,0,canvas.height);

grad.addColorStop(0,"rgba(0,0,0,0)");
grad.addColorStop(1,"rgba(0,0,0,0.6)");

ctx.fillStyle=grad;

ctx.fillRect(0,0,canvas.width,canvas.height);

}

let drawing=false;
let tool="brush";

function setBrush(){
tool="brush";
}

function setEraser(){
tool="eraser";
}

canvas.addEventListener("mousedown",()=>drawing=true);
canvas.addEventListener("mouseup",()=>drawing=false);

canvas.addEventListener("mousemove",(e)=>{

if(!drawing) return;

ctx.lineWidth=document.getElementById("size").value;
ctx.lineCap="round";

if(tool==="brush"){
ctx.strokeStyle=document.getElementById("color").value;
}else{
ctx.strokeStyle="white";
}

ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(e.offsetX,e.offsetY);

});

function addText(){

const text=document.getElementById("textInput").value;

ctx.font="40px Arial";
ctx.fillStyle="white";

ctx.fillText(text,50,80);

}

function saveProject(){

localStorage.setItem("imgProject",canvas.toDataURL());

alert("Project saved");

}

function loadProject(){

const data=localStorage.getItem("imgProject");

if(!data) return;

img.onload=function(){

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

}

img.src=data;

}

function download(){

const link=document.createElement("a");

link.download="image.png";
link.href=canvas.toDataURL();

link.click();

}

</script>

</body>
</html>

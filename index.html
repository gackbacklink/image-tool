<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Image Tool</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    img {
      max-width: 100%;
      margin-top: 15px;
      border-radius: 8px;
    }

    button {
      margin-top: 15px;
      padding: 10px 15px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <h1>🖼 Simple Image Tool</h1>

  <div class="container">
    <input type="file" id="upload" accept="image/*" />
    <br />
    <img id="preview" />
    <br />
    <button onclick="downloadImage()">📥 Download</button>
  </div>

  <script>
    const upload = document.getElementById("upload");
    const preview = document.getElementById("preview");

    upload.addEventListener("change", function() {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          preview.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    function downloadImage() {
      if (!preview.src) return alert("Upload gambar dulu!");

      const link = document.createElement("a");
      link.href = preview.src;
      link.download = "hasil-gambar.png";
      link.click();
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Image Studio</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
padding:20px;
max-width:1100px;
margin:auto;
}

canvas{
max-width:100%;
background:white;
margin-top:20px;
border-radius:10px;
}

button{
padding:8px 12px;
margin:4px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
background:#1e293b;
color:white;
}

button:hover{
background:#00c6ff;
}

.effects{
margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>🚀 Super Image Studio Level 11</h2>

<input type="file" id="upload" accept="image/*">

<br>

<canvas id="canvas"></canvas>

<div class="effects">

<h3>🎨 Effects</h3>

<button onclick="applyFilter('none')">Normal</button>
<button onclick="applyFilter('grayscale(100%)')">Grayscale</button>
<button onclick="applyFilter('sepia(100%)')">Sepia</button>
<button onclick="applyFilter('contrast(200%)')">High Contrast</button>
<button onclick="applyFilter('brightness(140%)')">Bright</button>
<button onclick="applyFilter('brightness(60%)')">Dark</button>
<button onclick="applyFilter('blur(3px)')">Blur</button>

<button onclick="applyFilter('sepia(40%) contrast(120%) brightness(90%)')">Vintage</button>

<button onclick="applyFilter('hue-rotate(180deg)')">Cool Tone</button>

<button onclick="applyFilter('hue-rotate(330deg) saturate(140%)')">Warm Tone</button>

<button onclick="applyFilter('contrast(150%) brightness(110%) saturate(120%)')">Cinematic</button>

<button onclick="sharpenImage()">Sharpen</button>

</div>

<br>

<button onclick="downloadImage()">📥 Download</button>

</div>

<script>

const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let img = new Image();

upload.addEventListener("change", function(){

const file = this.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

img.onload = function(){

canvas.width = img.width;
canvas.height = img.height;

ctx.drawImage(img,0,0);

}

img.src = e.target.result;

}

reader.readAsDataURL(file);

});

function applyFilter(filter){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.filter = filter;

ctx.drawImage(img,0,0,canvas.width,canvas.height);

}

function sharpenImage(){

const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
const data = imageData.data;

for(let i=0;i<data.length;i+=4){

data[i] = data[i]*1.15;
data[i+1] = data[i+1]*1.15;
data[i+2] = data[i+2]*1.15;

}

ctx.putImageData(imageData,0,0);

}

function downloadImage(){

const link = document.createElement("a");

link.download = "edited-image.png";

link.href = canvas.toDataURL();

link.click();

}

</script>

</body>
</html>

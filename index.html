<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Tool Pro Level 3</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}

.container{
  background:#1e1e1e;
  padding:20px;
  border-radius:12px;
  max-width:700px;
  margin:auto;
}

canvas{
  max-width:100%;
  margin-top:15px;
  border-radius:10px;
  cursor:crosshair;
}

.controls{
  margin-top:15px;
}

input[type=range]{
  width:200px;
}
button{
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
button{
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  font-weight:bold;
}

button:hover{
  opacity:0.85;
}

.container{
  background:#1a1a1a;
  padding:25px;
  border-radius:15px;
  max-width:800px;
  margin:auto;
  box-shadow:0 0 25px rgba(0,123,255,0.3);
}
</style>
</head>

<body>

<h1>🔥 Image Tool Pro</h1>

<div class="container">
<input type="file" id="upload" accept="image/*"><br>

<div class="controls">
<br>
🎚 Brightness
<input type="range" id="brightness" min="0" max="200" value="100">

<br>
🎚 Blur
<input type="range" id="blur" min="0" max="10" value="0">

<br><br>

<button onclick="cropImage()">✂️ Crop</button>
<button onclick="downloadImage()">📥 Download</button>
</div>

<canvas id="canvas"></canvas>
</div>

<script>
const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const brightness = document.getElementById("brightness");
const blur = document.getElementById("blur");

let img = new Image();
let startX, startY, isDragging = false;

upload.addEventListener("change", function(){
  const file = this.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    img.onload = function(){
      canvas.width = img.width;
      canvas.height = img.height;
      drawImage();
    }
    img.src = e.target.result;
  }
  reader.readAsDataURL(file);
});

function drawImage(){
  ctx.filter = `brightness(${brightness.value}%) blur(${blur.value}px)`;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img,0,0);
}

brightness.oninput = drawImage;
blur.oninput = drawImage;

// Simple Crop Drag
canvas.addEventListener("mousedown",(e)=>{
  startX = e.offsetX;
  startY = e.offsetY;
  isDragging = true;
});

canvas.addEventListener("mouseup",(e)=>{
  if(!isDragging) return;
  isDragging = false;

  const endX = e.offsetX;
  const endY = e.offsetY;

  const width = endX - startX;
  const height = endY - startY;

  const imageData = ctx.getImageData(startX,startY,width,height);

  canvas.width = width;
  canvas.height = height;

  ctx.putImageData(imageData,0,0);
});

function cropImage(){
  alert("Drag di gambar untuk crop ✂️");
}

function downloadImage(){
  const link = document.createElement("a");
  link.download = "image-pro.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>

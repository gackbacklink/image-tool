<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Image Studio</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

canvas{
max-width:100%;
background:white;
border-radius:10px;
margin-top:15px;
cursor:crosshair;
}

button{
padding:8px 12px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
background:#1e293b;
color:white;
font-weight:bold;
}

button:hover{
background:#00c6ff;
}

</style>

</head>

<body>

<div class="container">

<h2>🚀 AI Image Studio Level 17</h2>

<input type="file" id="upload">

<br>

<canvas id="canvas"></canvas>

<br><br>

<h3>🤖 AI Tools</h3>

<button onclick="aiEnhance()">AI Enhance</button>
<button onclick="removeNoise()">Remove Noise</button>
<button onclick="colorBoost()">Color Boost</button>
<button onclick="autoBalance()">Auto Balance</button>

<br><br>

<h3>🎨 Effects</h3>

<button onclick="blurBackground()">Portrait Blur</button>
<button onclick="sketchEffect()">Sketch</button>

<br><br>

<h3>💾 Project</h3>

<button onclick="saveProject()">Save</button>
<button onclick="loadProject()">Load</button>

<br><br>

<button onclick="download()">📥 Download</button>

</div>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const upload=document.getElementById("upload");

let img=new Image();

upload.addEventListener("change",function(){

const file=this.files[0];
const reader=new FileReader();

reader.onload=function(e){

img.onload=function(){

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

}

img.src=e.target.result;

}

reader.readAsDataURL(file);

});

function aiEnhance(){

const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
const d=imageData.data;

for(let i=0;i<d.length;i+=4){

d[i]*=1.15;
d[i+1]*=1.15;
d[i+2]*=1.15;

}

ctx.putImageData(imageData,0,0);

}

function removeNoise(){

const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
const d=imageData.data;

for(let i=0;i<d.length;i+=4){

const avg=(d[i]+d[i+1]+d[i+2])/3;

d[i]=(d[i]+avg)/2;
d[i+1]=(d[i+1]+avg)/2;
d[i+2]=(d[i+2]+avg)/2;

}

ctx.putImageData(imageData,0,0);

}

function colorBoost(){

const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
const d=imageData.data;

for(let i=0;i<d.length;i+=4){

d[i]*=1.2;
d[i+1]*=1.1;
d[i+2]*=1.1;

}

ctx.putImageData(imageData,0,0);

}

function autoBalance(){

const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
const d=imageData.data;

for(let i=0;i<d.length;i+=4){

d[i]=Math.min(255,d[i]*1.1);
d[i+1]=Math.min(255,d[i+1]*1.1);
d[i+2]=Math.min(255,d[i+2]*1.1);

}

ctx.putImageData(imageData,0,0);

}

function blurBackground(){

ctx.filter="blur(5px)";
ctx.drawImage(canvas,0,0);
ctx.filter="none";

}

function sketchEffect(){

const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
const d=imageData.data;

for(let i=0;i<d.length;i+=4){

const gray=(d[i]+d[i+1]+d[i+2])/3;

d[i]=gray;
d[i+1]=gray;
d[i+2]=gray;

}

ctx.putImageData(imageData,0,0);

}

function saveProject(){

localStorage.setItem("aiImage",canvas.toDataURL());

alert("Project saved");

}

function loadProject(){

const data=localStorage.getItem("aiImage");

if(!data) return;

img.onload=function(){

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

}

img.src=data;

}

function download(){

const link=document.createElement("a");

link.download="ai-image.png";
link.href=canvas.toDataURL();

link.click();

}

</script>

</body>
</html>

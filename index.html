<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Image Studio</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

canvas{
max-width:100%;
background:white;
border-radius:10px;
margin-top:15px;
}

button{
padding:8px 12px;
margin:4px;
border:none;
border-radius:8px;
cursor:pointer;
background:#1e293b;
color:white;
font-weight:bold;
}

button:hover{
background:#00c6ff;
}

.slider{
width:200px;
}

.drop{
border:2px dashed #555;
padding:20px;
margin-bottom:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🚀 Ultra Image Studio Level 12</h2>

<div class="drop" id="drop">
Drag & Drop Image Here
</div>

<input type="file" id="upload">

<br>

<canvas id="canvas"></canvas>

<h3>🎚 Adjust</h3>

Brightness  
<input class="slider" id="brightness" type="range" min="50" max="200" value="100">

Contrast  
<input class="slider" id="contrast" type="range" min="50" max="200" value="100">

Saturation  
<input class="slider" id="saturation" type="range" min="50" max="200" value="100">

<br><br>

<h3>🎨 Filters</h3>

<button onclick="setFilter('none')">Normal</button>
<button onclick="setFilter('grayscale(100%)')">Grayscale</button>
<button onclick="setFilter('sepia(100%)')">Sepia</button>
<button onclick="setFilter('blur(3px)')">Blur</button>
<button onclick="setFilter('invert(100%)')">Invert</button>
<button onclick="setFilter('hue-rotate(180deg)')">Cool</button>
<button onclick="setFilter('hue-rotate(320deg)')">Warm</button>
<button onclick="setFilter('contrast(180%) brightness(120%)')">Cinematic</button>

<br><br>

<h3>✨ Tools</h3>

<button onclick="autoEnhance()">Auto Enhance</button>

<button onclick="resizeImage(1080,1080)">Instagram</button>
<button onclick="resizeImage(1920,1080)">YouTube</button>
<button onclick="resizeImage(1000,1000)">Square</button>

<br><br>

<button onclick="downloadImage()">📥 Download</button>

</div>

<script>

const upload = document.getElementById("upload");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const brightness = document.getElementById("brightness");
const contrast = document.getElementById("contrast");
const saturation = document.getElementById("saturation");

let img = new Image();
let currentFilter = "none";

upload.addEventListener("change", loadImage);

function loadImage(){

const file = this.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

img.onload = function(){

canvas.width = img.width;
canvas.height = img.height;

drawImage();

}

img.src = e.target.result;

}

reader.readAsDataURL(file);

}

function drawImage(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.filter = `
brightness(${brightness.value}%)
contrast(${contrast.value}%)
saturate(${saturation.value}%)
${currentFilter}
`;

ctx.drawImage(img,0,0,canvas.width,canvas.height);

}

brightness.oninput = drawImage;
contrast.oninput = drawImage;
saturation.oninput = drawImage;

function setFilter(filter){

currentFilter = filter;

drawImage();

}

function autoEnhance(){

brightness.value = 120;
contrast.value = 130;
saturation.value = 120;

drawImage();

}

function resizeImage(w,h){

const temp = document.createElement("canvas");
const tctx = temp.getContext("2d");

temp.width = w;
temp.height = h;

tctx.drawImage(canvas,0,0,w,h);

canvas.width = w;
canvas.height = h;

ctx.drawImage(temp,0,0);

}

function downloadImage(){

const link = document.createElement("a");

link.download = "image-edit.png";

link.href = canvas.toDataURL();

link.click();

}

const drop = document.getElementById("drop");

drop.addEventListener("dragover",(e)=>{

e.preventDefault();

});

drop.addEventListener("drop",(e)=>{

e.preventDefault();

const file = e.dataTransfer.files[0];

const reader = new FileReader();

reader.onload = function(ev){

img.onload = function(){

canvas.width = img.width;
canvas.height = img.height;

drawImage();

}

img.src = ev.target.result;

}

reader.readAsDataURL(file);

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Studio Level 20</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
display:flex;
height:100vh;
}

.sidebar{
width:250px;
background:#111a2e;
padding:15px;
overflow:auto;
}

.main{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

canvas{
max-width:95%;
background:white;
border-radius:10px;
}

button{
width:100%;
padding:8px;
margin:4px 0;
border:none;
border-radius:6px;
cursor:pointer;
background:#1e293b;
color:white;
font-weight:bold;
}

button:hover{
background:#00c6ff;
}

</style>
</head>

<body>

<div class="sidebar">

<h3>🛠 Tools</h3>

<input type="file" id="upload">

<button onclick="undo()">↩ Undo</button>
<button onclick="redo()">↪ Redo</button>

<h3>🎨 Filters</h3>

<button onclick="setFilter('none')">Normal</button>
<button onclick="setFilter('grayscale(100%)')">Grayscale</button>
<button onclick="setFilter('sepia(100%)')">Sepia</button>
<button onclick="setFilter('contrast(200%)')">Contrast</button>
<button onclick="setFilter('brightness(130%)')">Bright</button>

<h3>📤 Export</h3>

<button onclick="exportPNG()">Download PNG</button>
<button onclick="exportJPG()">Download JPG</button>

</div>

<div class="main">
<canvas id="canvas"></canvas>
</div>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const upload=document.getElementById("upload");

let img=new Image();
let history=[];
let redoStack=[];
let currentFilter="none";

function saveState(){
history.push(canvas.toDataURL());
}

function restoreState(data){
img.onload=function(){
canvas.width=img.width;
canvas.height=img.height;
ctx.drawImage(img,0,0);
}
img.src=data;
}

upload.addEventListener("change",function(){

const file=this.files[0];
if(!file) return;

const reader=new FileReader();

reader.onload=function(e){

img.onload=function(){

canvas.width=img.width;
canvas.height=img.height;

saveState();
ctx.drawImage(img,0,0);

}

img.src=e.target.result;

}

reader.readAsDataURL(file);

});

function setFilter(filter){

currentFilter=filter;

ctx.filter=currentFilter;
ctx.drawImage(canvas,0,0);
ctx.filter="none";

}

function undo(){

if(history.length>1){

redoStack.push(history.pop());
restoreState(history[history.length-1]);

}

}

function redo(){

if(redoStack.length>0){

const data=redoStack.pop();
history.push(data);
restoreState(data);

}

}

function exportPNG(){

const link=document.createElement("a");
link.download="project.png";
link.href=canvas.toDataURL("image/png");
link.click();

}

function exportJPG(){

const link=document.createElement("a");
link.download="project.jpg";
link.href=canvas.toDataURL("image/jpeg",0.9);
link.click();

}

</script>

</body>
</html>

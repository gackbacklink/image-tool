<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Tool HD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Image Tool HD</h1>

    <!-- Upload gambar -->
    <input type="file" id="imageInput" accept="image/*">

    <!-- Preview canvas -->
    <div class="preview">
      <canvas id="canvas"></canvas>
    </div>

    <!-- Tools / tombol -->
    <div class="tools">
      <button id="resizeBtn">Resize</button>
      <button id="grayscaleBtn">Grayscale</button>
      <button onclick="applySepia()">Sepia</button>
      <button onclick="invertColors()">Invert</button>
      <button onclick="adjustBrightness(30)">Bright +30</button>
      <button id="downloadBtn">Download</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
